<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الرسائل | نظام مشاريع العبور</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

    <style>
        :root {
            --bg: #f4f7fe;
            --sidebar-bg: #1e3a8a;
            --glass: #ffffff;
            --text-main: #1e293b;
            --accent: #3b82f6;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Cairo', sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        .sidebar {
            width: 280px;
            height: 100vh;
            position: fixed;
            right: 0;
            top: 0;
            padding: 40px 20px;
            z-index: 1000;
            background: var(--sidebar-bg);
            box-shadow: -5px 0 20px rgba(0, 0, 0, 0.05);
        }

        .nav-link {
            color: rgba(255, 255, 255, 0.7);
            padding: 12px 20px;
            border-radius: 12px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            text-decoration: none;
            transition: 0.3s;
        }

        .nav-link.active,
        .nav-link:hover {
            background: rgba(255, 255, 255, 0.15);
            color: white;
            font-weight: bold;
        }

        .main-content {
            margin-right: 280px;
            padding: 30px;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .chat-container {
            display: flex;
            height: calc(100vh - 150px);
            gap: 20px;
        }

        .contacts-list {
            width: 350px;
            overflow-y: auto;
        }

        .chat-view {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--glass);
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(0, 0, 0, 0.05);
            overflow: hidden;
        }

        .contact-card {
            padding: 15px;
            border-radius: 15px;
            background: var(--glass);
            border: 1px solid #e2e8f0;
            margin-bottom: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        .contact-card.active {
            background: #eef2ff;
            border-color: var(--accent);
        }

        .messages-box {
            flex: 1;
            overflow-y: auto;
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: #fafbff;
        }

        .msg {
            max-width: 70%;
            padding: 12px 18px;
            border-radius: 18px;
            font-size: 0.95rem;
        }

        .msg.received {
            background: #ffffff;
            color: var(--text-main);
            align-self: flex-start;
            border-bottom-right-radius: 4px;
            border: 1px solid #e2e8f0;
        }

        .msg.sent {
            background: var(--accent);
            color: white;
            align-self: flex-end;
            border-bottom-left-radius: 4px;
        }

        .chat-input {
            padding: 20px;
            background: white;
            border-top: 1px solid #e2e8f0;
            display: flex;
            gap: 12px;
        }

        input.form-control {
            background: #f8fafc;
            border-radius: 12px;
            padding: 12px;
        }

        .btn-send {
            background: var(--accent);
            color: white;
            border-radius: 12px;
            padding: 0 25px;
        }

        @media (max-width: 992px) {
            .sidebar {
                display: none;
            }

            .main-content {
                margin-right: 0;
            }
        }
    </style>
</head>

<body>
    <aside class="sidebar">
        <div class="text-center mb-5">
            <h3 class="fw-900">نظام المشاريع</h3>
            <small style="color: #60a5fa">بوابة الطالب </small>
        </div>
        <nav>
            <a href="student_dashboard.html" class="nav-link"><i class="fas fa-home ms-2"></i> الرئيسية</a>
            <a href="masseges.html" class="nav-link active"><i class="fas fa-envelope ms-2"></i> الرسائل</a>
            <a href="my-team.html" class="nav-link"><i class="fas fa-users ms-2"></i> فريقي</a>
            <a href="assignments.html" class="nav-link"><i class="fas fa-cloud-upload ms-2"></i> تسليم المهام</a>
            <a href="../../landing/views/index.html" class="nav-link text-warning mt-5"><i
                    class="fas fa-power-off ms-2"></i> خروج</a>
        </nav>
    </aside>

    <main class="main-content">
        <header class="mb-4" data-aos="fade-down">
            <h2 class="fw-900" style="color: var(--sidebar-bg);">الرسائل 💬</h2>
            <p class="text-muted">تواصل مع المشرفين وزملائك في الفريق</p>
        </header>

        <div class="chat-container">
            <div class="contacts-list" data-aos="fade-left">
                <div class="contact-card active d-flex align-items-center gap-3 shadow-sm">
                    <img src="https://ui-avatars.com/api/?name=Dr+Mohamed&background=1e3a8a&color=fff" width="45"
                        class="rounded-circle">
                    <div>
                        <h6 class="fw-bold m-0">د. محمد علي</h6>
                        <small class="text-success fw-bold">متصل الآن</small>
                    </div>
                </div>
            </div>

            <div class="chat-view" data-aos="fade-up">
                <div class="p-3 border-bottom d-flex align-items-center gap-3 bg-white">
                    <img src="https://ui-avatars.com/api/?name=Dr+Mohamed&background=1e3a8a&color=fff" width="40"
                        class="rounded-circle">
                    <h6 class="fw-bold m-0">د. محمد علي (مشرف المشروع)</h6>
                </div>

                <div class="messages-box">
                    <div class="msg received">أهلاً يا محمد، هل تم الانتهاء من ربط الـ API؟</div>
                    <div class="msg sent shadow-sm">أهلاً يا دكتور، جاري العمل عليها الآن.</div>
                </div>

                <div class="chat-input">
                    <button class="btn btn-outline-light border text-muted rounded-3"><i
                            class="fas fa-paperclip"></i></button>
                    <input type="text" class="form-control shadow-none" placeholder="اكتب رسالتك هنا...">
                    <button class="btn btn-send shadow-sm"><i class="fas fa-paper-plane ms-2"></i> إرسال</button>
                </div>
            </div>
        </div>
    </main>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 800 });
        const chatInput = document.querySelector('.chat-input input');
        const sendBtn = document.querySelector('.btn-send');
        const messagesBox = document.querySelector('.messages-box');

        function sendMessage() {
            const messageText = chatInput.value.trim();
            if (messageText !== "") {
                const newMsg = document.createElement('div');
                newMsg.className = 'msg sent shadow-sm';
                newMsg.innerText = messageText;
                messagesBox.appendChild(newMsg);
                chatInput.value = "";
                messagesBox.scrollTop = messagesBox.scrollHeight;
            }
        }
        sendBtn.addEventListener('click', sendMessage);
        chatInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
    </script>
</body>

</html>
