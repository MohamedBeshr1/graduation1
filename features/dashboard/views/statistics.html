<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الاجتماعات | Assistent</title>

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --dark-body: #020617;
            --glass-card: rgba(30, 41, 59, 0.7);
            --accent-blue: #3b82f6;
            --text-vivid: #ffffff;
        }

        body {
            background-color: var(--dark-body);
            background-image: radial-gradient(circle at top right, #1e293b 0%, #020617 100%);
            font-family: 'Cairo', sans-serif;
            color: var(--text-vivid);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .admin-sidebar {
            width: 280px;
            height: 100vh;
            position: fixed;
            top: 0;
            right: 0;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1000;
        }

        .nav-link-admin {
            color: rgba(255, 255, 255, 0.7);
            padding: 14px 25px;
            display: flex;
            align-items: center;
            text-decoration: none;
            transition: 0.3s;
            margin: 5px 15px;
            border-radius: 12px;
            font-weight: 600;
        }

        .nav-link-admin.active {
            background: var(--accent-blue);
            color: white !important;
            box-shadow: 0 4px 20px rgba(59, 130, 246, 0.4);
            font-weight: 700;
        }

        .nav-link-admin:hover:not(.active) {
            background: rgba(255, 255, 255, 0.05);
            color: white;
        }

        .main-content {
            margin-right: 280px;
            padding: 40px;
        }

        .glass-form-card {
            background: var(--glass-card);
            border-radius: 30px;
            padding: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
        }

        .form-label {
            font-weight: 700;
            color: #60a5fa;
            margin-bottom: 10px;
        }

        .form-control,
        .form-select {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white !important;
            padding: 12px;
            transition: 0.3s;
        }

        .form-control:focus,
        .form-select:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--accent-blue);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.3);
            outline: none;
        }

        option {
            background: #1e293b;
            color: white;
        }

        .btn-save {
            background: linear-gradient(45deg, #3b82f6, #2563eb);
            border: none;
            color: white;
            font-weight: 800;
            padding: 15px 40px;
            border-radius: 15px;
            width: 100%;
            font-size: 1.1rem;
            transition: 0.3s;
            margin-top: 20px;
        }

        .btn-save:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3);
        }

        @media (max-width: 992px) {
            .admin-sidebar {
                right: -280px;
            }

            .main-content {
                margin-right: 0;
            }
        }
    </style>
</head>

<body>

    <aside class="Assistent-sidebar">
        <div class="text-center py-5">
            <h3 class="fw-900 text-white">Assistent<span class="text-info"></span></h3>
            <span class="badge bg-primary">نظام إدارة العبور</span>
        </div>
        <nav id="sidebarNav">
            <a href="../../dashboard/views/generalstatistics.html" class="nav-link-Assistent">
                <i class="fas fa-chart-pie ms-2"></i> الإحصائيات العامة
            </a>
            <a href="../../dashboard/views/admin_dashboard.html" class="nav-link-Assistent">
                <i class="fas fa-tasks ms-2"></i> متابعة الفرق
            </a>
            <a href="../../dashboard/views/review.html" class="nav-link-Assistent">
                <i class="fas fa-book-open ms-2"></i> مراجعة التعليمات
            </a>
            <a href="../../dashboard/views/statistics.html" class="nav-link-Assistent active">
                <i class="fas fa-database ms-2"></i> تسجيل الاجتماعات
            </a>
            <a href="../../dashboard/views/alerts.html" class="nav-link-Assistent">
                <i class="fas fa-exclamation-triangle ms-2"></i> التنبيهات
            </a>
            <a href="../../landing/views/index.html" class="nav-link-Assistent text-danger mt-5">
                <i class="fas fa-sign-out-alt ms-2"></i> خروج النظام
            </a>
        </nav>
    </aside>

    <div class="main-content">
        <header class="mb-5" data-aos="fade-down">
            <h1 class="fw-900 text-white">تسجيل بيانات الاجتماع</h1>
            <p class="text-info">توثيق مخرجات الاجتماع، المهام، وتقييم أداء الفريق</p>
        </header>

        <div class="row justify-content-center">
            <div class="col-lg-10">
                <div class="glass-form-card" data-aos="fade-up">
                    <form id="meetingForm" onsubmit="saveMeeting(event)">
                        <div class="row g-4">
                            <div class="col-md-6">
                                <label class="form-label">تاريخ الاجتماع</label>
                                <input type="date" class="form-control" required>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">الفريق المعني</label>
                                <select class="form-select" required>
                                    <option value="" selected disabled>اختر الفريق...</option>
                                    <option>فريق الصقور</option>
                                    <option>فريق النجوم</option>
                                    <option>فريق التحليل</option>
                                </select>
                            </div>

                            <div class="col-12">
                                <label class="form-label">تقييم الأداء خلال الاجتماع</label>
                                <select class="form-select">
                                    <option value="5">ممتاز (التزام كامل بالجدول الزمني)</option>
                                    <option value="4">جيد جداً (تقدم ملحوظ)</option>
                                    <option value="3">جيد (يحتاج بعض التحسينات)</option>
                                    <option value="2">مقبول (تأخير بسيط)</option>
                                    <option value="1">ضعيف (يوجد مشاكل فنية)</option>
                                </select>
                            </div>

                            <div class="col-12">
                                <label class="form-label">المهام المطلوبة للتنفيذ (To-Do List)</label>
                                <textarea class="form-control" rows="5"
                                    placeholder="اكتب قائمة المهام والمسؤوليات الجديدة هنا..."></textarea>
                            </div>

                            <div class="col-12">
                                <label class="form-label">ملاحظات عامة</label>
                                <textarea class="form-control" rows="3"
                                    placeholder="أي ملاحظات أخرى تم مناقشتها..."></textarea>
                            </div>

                            <div class="col-12">
                                <button type="submit" class="btn btn-save">
                                    <i class="fas fa-save me-2"></i> حفظ بيانات الاجتماع
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1000 });

        function saveMeeting(event) {
            event.preventDefault();
            Swal.fire({
                title: 'جاري الحفظ...',
                html: 'يتم تسجيل محضر الاجتماع وتحديث مهام الفريق',
                timer: 1500,
                timerProgressBar: true,
                didOpen: () => { Swal.showLoading() }
            }).then(() => {
                Swal.fire({
                    icon: 'success',
                    title: 'تم التسجيل بنجاح',
                    text: 'تم إرسال المهام والتقييم إلى لوحة تحكم الفريق',
                    confirmButtonColor: '#3b82f6'
                });
            });
        }
        document.addEventListener("DOMContentLoaded", function () {
            const currentPath = window.location.pathname;
            const navLinks = document.querySelectorAll('.nav-link-Assistent');

            navLinks.forEach(link => {
                link.classList.remove('active');
                if (currentPath.endsWith(link.getAttribute('href').split('/').pop())) {
                    link.classList.add('active');
                }
            });
        });
    </script>

</body>

</html>
