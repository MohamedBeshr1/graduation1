<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم مدير النظام | Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --admin-primary: #1a202c; --accent-blue: #3182ce; }
        body { background-color: #f7fafc; font-family: 'Segoe UI', Tahoma, sans-serif; }
        .admin-card { border: none; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .status-badge { padding: 5px 12px; border-radius: 20px; font-size: 0.85rem; }
    </style>
</head>
<body>

<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-3">
        <div>
            <h2 class="fw-bold text-dark">لوحة تحكم المسؤول (Admin)</h2>
            <p class="text-muted mb-0">إدارة المواعيد، الدكاترة، والطلاب - معهد العبور</p>
        </div>
        <button class="btn btn-outline-danger btn-sm" onclick="location.href='../../landing/views/index.html'">
            <i class="fas fa-sign-out-alt"></i> خروج
        </button>
    </div>

    <div class="row g-3 mb-4">
        <div class="col-md-3">
            <div class="card admin-card p-3 bg-white border-bottom border-primary border-4">
                <h6 class="text-muted">إجمالي الفرق</h6>
                <h3 class="fw-bold mb-0">120</h3>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card admin-card p-3 bg-white border-bottom border-success border-4">
                <h6 class="text-muted">طلاب مسجلين</h6>
                <h3 class="fw-bold mb-0">360</h3>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card admin-card p-3 bg-white border-bottom border-info border-4">
                <h6 class="text-muted">أعضاء التدريس</h6>
                <h3 class="fw-bold mb-0">18</h3>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card admin-card p-3 bg-white border-bottom border-warning border-4">
                <h6 class="text-muted">مشاريع لم تُعتمد</h6>
                <h3 class="fw-bold mb-0">7</h3>
            </div>
        </div>
    </div>

    <div class="row g-4">
        <div class="col-lg-8">
            <div class="card admin-card p-4">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h5 class="fw-bold">قائمة أعضاء هيئة التدريس</h5>
                    <button class="btn btn-primary btn-sm"><i class="fas fa-plus"></i> إضافة دكتور</button>
                </div>
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>الدكتور</th>
                                <th>القسم</th>
                                <th>عدد الفرق</th>
                                <th>الإجراء</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>د. محمد علي</td>
                                <td>نظم معلومات</td>
                                <td><span class="badge bg-light text-dark">5 فرق</span></td>
                                <td>
                                    <button class="btn btn-sm btn-link"><i class="fas fa-edit"></i></button>
                                    <button class="btn btn-sm btn-link text-danger"><i class="fas fa-trash"></i></button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="col-lg-4">
            <div class="card admin-card p-4 h-100">
                <h5 class="fw-bold mb-3 text-danger">المواعيد النهائية (Deadlines)</h5>
                <div class="mb-3">
                    <label class="form-label small">تسليم البروبوزال</label>
                    <input type="date" class="form-control form-control-sm" value="2026-05-10">
                </div>
                <div class="mb-3">
                    <label class="form-label small">تسليم الـ Analysis</label>
                    <input type="date" class="form-control form-control-sm" value="2026-06-01">
                </div>
                <div class="mb-4">
                    <label class="form-label small">المناقشة المبدئية</label>
                    <input type="date" class="form-control form-control-sm" value="2026-07-15">
                </div>
                <button class="btn btn-dark w-100 shadow-sm" onclick="alert('تم حفظ المواعيد بنجاح')">حفظ التغييرات</button>
                
                <div class="mt-4 p-3 bg-light rounded border">
                    <h6 class="fw-bold small mb-2"><i class="fas fa-bullhorn text-warning me-1"></i> تنبيه عام للطلاب</h6>
                    <textarea class="form-control form-control-sm" rows="2" placeholder="اكتب تنبيه ليظهر لجميع الطلاب..."></textarea>
                    <button class="btn btn-link btn-sm p-0 mt-2">إرسال التنبيه</button>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

<script src="../viewmodels/dashboard_viewmodel.js"></script>

<script src="../viewmodels/dashboard_student_vm.js"></script></body>
</html>
