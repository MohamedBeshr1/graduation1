<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة تحكم الطالب | FMS</title>
    <link href="https://cdn.npmmirror.com/bootstrap/5.3.0/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary-blue: #004085; --bg-gray: #f4f7f6; }
        body { background-color: var(--bg-gray); font-family: 'Segoe UI', Tahoma, sans-serif; }
        .stat-card { border: none; border-radius: 15px; transition: 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .stat-card:hover { transform: translateY(-5px); }
        .project-progress { background: white; border-radius: 15px; padding: 25px; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-5">
        <div>
            <h2 class="fw-bold text-primary">لوحة تحكم الطالب</h2>
            <p class="text-muted">نظام إدارة مشاريع التخرج - معهد العبور</p>
        </div>
        <div class="text-end">
            <span class="badge bg-primary p-2">فريق رقم 104</span>
        </div>
    </div>

    <div class="row g-4 mb-4">
        <div class="col-md-4">
            <div class="card stat-card p-3 bg-white border-start border-primary border-5">
                <div class="d-flex justify-content-between">
                    <div>
                        <h6 class="text-muted">المشرف الأكاديمي</h6>
                        <h5 class="fw-bold mb-0">د. محمد علي</h5>
                    </div>
                    <i class="fas fa-user-tie fa-2x text-primary opacity-50"></i>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card stat-card p-3 bg-white border-start border-success border-5">
                <div class="d-flex justify-content-between">
                    <div>
                        <h6 class="text-muted">حالة التسليم</h6>
                        <h5 class="fw-bold mb-0">تم اعتماد الفكرة</h5>
                    </div>
                    <i class="fas fa-check-double fa-2x text-success opacity-50"></i>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card stat-card p-3 bg-white border-start border-warning border-5">
                <div class="d-flex justify-content-between">
                    <div>
                        <h6 class="text-muted">الموعد القادم</h6>
                        <h5 class="fw-bold mb-0">تسليم الـ ERD</h5>
                    </div>
                    <i class="fas fa-clock fa-2x text-warning opacity-50"></i>
                </div>
            </div>
        </div>
    </div>

    <div class="project-progress shadow-sm">
        <div class="d-flex justify-content-between mb-2">
            <h6 class="fw-bold">نسبة إكمال المشروع</h6>
            <span class="fw-bold text-primary">45%</span>
        </div>
        <div class="progress" style="height: 15px; border-radius: 10px;">
            <div class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar" style="width: 45%;"></div>
        </div>
    </div>

    <div class="card border-0 shadow-sm p-4 text-center mb-4">
        <h5 class="fw-bold mb-3">رفع ملفات المهمة الحالية</h5>
        <div class="p-5 border-2 border-dashed rounded-3 bg-light" style="border: 2px dashed #ccc;">
            <i class="fas fa-cloud-upload-alt fa-3x text-muted mb-3"></i>
            <p>اسحب الملفات هنا أو اضغط للاختيار</p>
            <input type="file" class="form-control w-50 mx-auto">
            <button class="btn btn-primary mt-3 px-5">رفع الآن</button>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

<script src="../viewmodels/dashboard_viewmodel.js"></script>

<script src="../viewmodels/dashboard_student_vm.js"></script>
</body>
</html>
