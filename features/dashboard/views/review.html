<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مراجعة الملفات | Assistent</title>

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --dark-body: #020617;
            --glass-card: rgba(30, 41, 59, 0.7);
            --accent-blue: #3b82f6;
            --text-vivid: #ffffff;
        }

        body {
            background-color: var(--dark-body);
            background-image: radial-gradient(circle at top right, #1e293b 0%, #020617 100%);
            font-family: 'Cairo', sans-serif;
            color: var(--text-vivid);
            min-height: 100vh;
        }

        .admin-sidebar {
            width: 280px;
            height: 100vh;
            position: fixed;
            top: 0;
            right: 0;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1000;
        }

        .nav-link-admin {
            color: rgba(255, 255, 255, 0.7);
            padding: 14px 25px;
            display: flex;
            align-items: center;
            text-decoration: none;
            transition: 0.3s;
            margin: 5px 15px;
            border-radius: 12px;
            font-weight: 700;
        }

        /* الإضاءة عند التفعيل */
        .nav-link-admin.active {
            background: var(--accent-blue) !important;
            color: white !important;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }

        .nav-link-admin:hover:not(.active) {
            background: rgba(255, 255, 255, 0.05);
            color: white;
        }

        .main-content {
            margin-right: 280px;
            padding: 40px;
        }

        .file-bar {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 15px 25px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.3s;
        }

        .file-bar:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        .review-box {
            background: var(--glass-card);
            border-radius: 25px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .form-control {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            padding: 15px;
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--accent-blue);
            color: white;
            box-shadow: none;
        }

        .status-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .btn-status {
            flex: 1;
            border: none;
            padding: 12px;
            border-radius: 12px;
            font-weight: 700;
            transition: 0.3s;
            opacity: 0.5;
        }

        .btn-status.active {
            opacity: 1;
            transform: translateY(-3px);
        }

        .btn-accept {
            background: #10b981;
            color: white;
        }

        .btn-reject {
            background: #ef4444;
            color: white;
        }

        .btn-mod {
            background: #f59e0b;
            color: white;
        }

        @media (max-width: 992px) {
            .admin-sidebar {
                right: -280px;
            }

            .main-content {
                margin-right: 0;
            }
        }
    </style>
</head>

<body>

    <aside class="admin-sidebar">
        <div class="text-center py-5">
            <h3 class="fw-900 text-white">Assistent<span class="text-info"></span></h3>
            <span class="badge bg-primary">نظام إدارة العبور</span>
        </div>
        <nav id="dynamic-nav">
            <a href="../../dashboard/views/generalstatistics.html" class="nav-link-admin"><i
                    class="fas fa-chart-pie ms-2"></i> الإحصائيات العامة</a>
            <a href="../../dashboard/views/Assistent_dashboard.html" class="nav-link-admin"><i
                    class="fas fa-tasks ms-2"></i> متابعة الفرق</a>
            <a href="../../dashboard/views/review.html" class="nav-link-admin"><i class="fas fa-book-open ms-2"></i>
                مراجعة التعليمات</a>
            <a href="../../dashboard/views/statistics.html" class="nav-link-admin"><i class="fas fa-database ms-2"></i>
                تسجيل الاجتماعات</a>
            <a href="../../dashboard/views/alerts.html" class="nav-link-admin"><i
                    class="fas fa-exclamation-triangle ms-2"></i> التنبيهات</a>
            <a href="../../landing/views/index.html" class="nav-link-admin text-danger mt-5"><i
                    class="fas fa-sign-out-alt ms-2"></i> خروج النظام</a>
        </nav>
    </aside>

    <div class="main-content">
        <header class="mb-5" data-aos="fade-down">
            <h1 class="fw-900 text-white m-0">مراجعة الملفات المرفوعة</h1>
            <p class="text-info fw-bold">فحص وتحميل مخرجات الفرق واتخاذ القرار</p>
        </header>

        <div class="row g-4">
            <div class="col-lg-7" data-aos="fade-right">
                <h5 class="text-white mb-4">قائمة الملفات المستلمة</h5>
                <div class="file-bar">
                    <div class="d-flex align-items-center gap-3">
                        <i class="fas fa-file-pdf fa-2x text-danger"></i>
                        <div>
                            <h6 class="m-0 fw-bold">تقرير دراسة الجدوى.pdf</h6>
                            <small class="text-secondary">الحجم: 1.2MB • 2024/05/10</small>
                        </div>
                    </div>
                    <button class="btn btn-outline-info rounded-pill px-4"><i class="fas fa-download me-2"></i>
                        تحميل</button>
                </div>
            </div>

            <div class="col-lg-5" data-aos="fade-left">
                <div class="review-box shadow-lg">
                    <h5 class="fw-bold mb-4 text-white">صندوق تقييم المشرف</h5>
                    <div class="mb-4">
                        <label class="form-label text-secondary">اكتب ملاحظاتك للفريق:</label>
                        <textarea id="noteText" class="form-control" rows="6"
                            placeholder="اكتب ملاحظاتك هنا..."></textarea>
                    </div>
                    <div class="mb-4">
                        <label class="form-label text-secondary">حالة الاعتماد:</label>
                        <div class="status-group">
                            <button class="btn-status btn-accept" onclick="selectStatus(this, 'مقبول')">مقبول</button>
                            <button class="btn-status btn-reject" onclick="selectStatus(this, 'مرفوض')">مرفوض</button>
                            <button class="btn-status btn-mod" onclick="selectStatus(this, 'تعديل')">تعديل</button>
                        </div>
                    </div>
                    <button class="btn btn-primary w-100 py-3 fw-bold rounded-pill" onclick="submitDecision()">حفظ
                        القرار</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1000 });
        document.addEventListener("DOMContentLoaded", function () {
            const currentPage = window.location.pathname.split("/").pop();
            const navLinks = document.querySelectorAll('.nav-link-admin');
            navLinks.forEach(link => {
                const linkPage = link.getAttribute('href').split("/").pop();
                link.classList.remove('active');
                if (currentPage === linkPage) {
                    link.classList.add('active');
                }
            });
        });

        let currentStatus = "";
        function selectStatus(btn, status) {
            document.querySelectorAll('.btn-status').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentStatus = status;
        }

        function submitDecision() {
            if (!currentStatus) {
                Swal.fire('تنبيه', 'يرجى اختيار حالة الاعتماد', 'warning');
                return;
            }
            Swal.fire('تم الإرسال', 'تم إبلاغ الفريق بنجاح', 'success');
        }
    </script>
</body>

</html>
