<!DOCTYPE html>
<html lang="ar" dir="rtl" id="appHtml">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة الفرق - معاهد العبور</title>

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet"
        id="bootstrapLink">

    <style>
        :root {
            /* Palette from your preferred style */
            --bg-deep-navy: #030712;
            --sidebar-navy: #0f172a;
            --card-navy: #161b26;
            --accent-gradient: linear-gradient(135deg, #8b5cf6 0%, #6366f1 100%);
            --border-color: rgba(255, 255, 255, 0.05);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --sidebar-width: 280px;
        }

        .light-theme {
            --bg-deep-navy: #f1f5f9;
            --sidebar-navy: #ffffff;
            --card-navy: #ffffff;
            --text-main: #0f172a;
            --border-color: #e2e8f0;
        }

        * {
            font-family: 'Cairo', sans-serif !important;
        }

        body {
            background: var(--bg-deep-navy);
            color: var(--text-main);
            margin: 0;
            min-height: 100vh;
            transition: 0.4s;
        }

        /* --- Sidebar (Unified Structure) --- */
        .sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            position: fixed;
            right: 0;
            top: 0;
            background: var(--sidebar-navy);
            border-left: 1px solid var(--border-color);
            z-index: 1050;
            transition: 0.3s;
            backdrop-filter: blur(20px);
        }

        .sidebar-header {
            border-bottom: 1px solid var(--border-color);
        }

        .sidebar-nav a {
            display: flex;
            align-items: center;
            padding: 15px 25px;
            color: var(--text-muted);
            text-decoration: none;
            border-radius: 15px;
            margin: 5px 15px;
            font-weight: 600;
            transition: 0.3s;
        }

        .sidebar-nav a:hover,
        .sidebar-nav a.active {
            background: var(--accent-gradient);
            color: white !important;
            box-shadow: 0 10px 20px rgba(139, 92, 246, 0.2);
        }

        /* --- Main Layout --- */
        .main-wrapper {
            margin-right: var(--sidebar-width);
            padding: 30px;
            transition: 0.3s;
        }

        .main-header {
            background: var(--card-navy);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 15px 30px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
        }

        /* --- Content Cards --- */
        .card-custom {
            background: var(--card-navy);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
        }

        .stat-card {
            border-right: 4px solid #8b5cf6;
        }

        /* --- Modern Table --- */
        .table-responsive {
            border-radius: 15px;
        }

        .table {
            color: inherit;
            margin: 0;
        }

        .table thead th {
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-muted);
            border: none;
            padding: 15px;
            font-size: 14px;
        }

        .table tbody td {
            padding: 18px;
            border-bottom: 1px solid var(--border-color);
            vertical-align: middle;
        }

        /* --- Buttons & UI --- */
        .btn-primary {
            background: var(--accent-gradient);
            border: none;
            padding: 10px 25px;
            border-radius: 30px;
            font-weight: 700;
            transition: 0.3s;
        }

        .modal-content {
            background: var(--sidebar-navy);
            border: 1px solid var(--border-color);
            color: white;
            border-radius: 25px;
        }

        .form-control {
            background: #ffffff !important;
            color: #000 !important;
            border-radius: 12px;
            padding: 12px;
            font-weight: 700;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1040;
            display: none;
        }

        @media (max-width: 992px) {
            .sidebar {
                right: -100%;
            }

            .sidebar.active {
                right: 0;
            }

            .main-wrapper {
                margin-right: 0;
            }

            .overlay.active {
                display: block;
            }
        }
    </style>
</head>

<body>

    <div class="overlay" id="overlay"></div>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header text-center py-5">
            <div class="bg-primary d-inline-block p-2 rounded-3 mb-2 shadow-lg">
                <i class="fas fa-graduation-cap text-white fs-3"></i>
            </div>
            <h4 class="fw-900 m-0 text-white" id="t-sys-name">Doctor</h4>
            <small class="opacity-50 text-white" id="t-inst">معاهد العبور العليا</small>
        </div>
        <nav class="sidebar-nav">
            <a href="../../dashboard/views/instructor_dashboard.html"><i class="fas fa-home ms-3"></i> <span
                    id="t-home">الرئيسية</span></a>
            <a href="#" class="active"><i class="fas fa-users ms-3"></i> <span id="t-teams">الفرق والطلاب</span></a>
            <a href="#"><i class="fas fa-calendar-alt ms-3"></i> <span id="t-sched">المواعيد والقاعات</span></a>
            <a href="#"><i class="fas fa-chart-pie ms-3"></i> <span id="t-stats">الإحصائيات</span></a>
            <a href="../../landing/views/index.html" style="margin-top: 50px; color: #ff4757;"><i
                    class="fas fa-sign-out-alt ms-3"></i> <span id="t-out">خروج</span></a>
        </nav>
    </aside>

    <div class="main-wrapper">
        <header class="main-header">
            <div class="d-flex align-items-center">
                <button class="btn btn-outline-light border-0 d-lg-none me-3" id="openSidebar">
                    <i class="fas fa-bars"></i>
                </button>
                <div>
                    <h5 class="m-0 fw-bold" id="t-welcome">إدارة الفرق</h5>
                    <small class="text-muted">نظام إدارة مشاريع التخرج</small>
                </div>
            </div>

            <div class="d-flex align-items-center gap-3">
                <button class="btn btn-sm btn-outline-secondary rounded-pill px-3" onclick="toggleLang()"
                    id="langBtn">EN</button>
                <button class="btn btn-sm btn-outline-secondary rounded-pill" onclick="toggleTheme()"><i
                        class="fas fa-moon"></i></button>
                <div class="user-profile ms-3 d-flex align-items-center gap-2">
                    <span class="fw-bold d-none d-md-block" id="userName">د/ريهام الشامي</span>
                    <div class="bg-primary rounded-circle shadow"
                        style="width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white;">
                        AD</div>
                </div>
            </div>
        </header>

        <div class="row mb-4">
            <div class="col-md-3">
                <div class="card-custom stat-card">
                    <small class="text-muted fw-bold d-block mb-1 text-uppercase">إجمالي الفرق</small>
                    <h2 class="fw-900 m-0 text-primary" id="totalTeamsCount">0</h2>
                </div>
            </div>
        </div>

        <div class="card-custom">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h5 class="fw-bold m-0"><i class="fas fa-list-ul ms-2 text-primary"></i> قائمة الطلاب والمشاريع</h5>
                <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addTeamModal"
                    onclick="window.TeamsViewModel.prepareForAdd()">
                    <i class="fas fa-plus ms-1"></i> حجز جديد
                </button>
            </div>

            <div class="table-responsive">
                <table class="table align-middle text-center table-hover">
                    <thead>
                        <tr>
                            <th>اسم الفريق</th>
                            <th>المشروع</th>
                            <th>الأعضاء</th>
                            <th>الحالة</th>
                            <th>العمليات</th>
                        </tr>
                    </thead>
                    <tbody id="teamsTableBody">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="modal fade" id="addTeamModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header border-0 pb-0">
                    <h5 class="fw-900">إضافة بيانات فريق</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="addTeamForm">
                        <div class="mb-3">
                            <label class="form-label small fw-bold">اسم الفريق</label>
                            <input type="text" id="newTeamName" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold">عنوان المشروع</label>
                            <input type="text" id="newProjectTitle" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold">الأعضاء (فصل بـ |)</label>
                            <input type="text" id="newMembers" class="form-control"
                                placeholder="طالب 1 | طالب 2 | طالب 3">
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-3 mt-3 shadow">حفظ الفريق</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // تفعيل الـ Sidebar في الموبايل والـ Theme
        document.addEventListener('DOMContentLoaded', function () {
            const openBtn = document.getElementById('openSidebar');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');

            openBtn?.addEventListener('click', () => {
                sidebar.classList.add('active');
                overlay.classList.add('active');
            });

            overlay?.addEventListener('click', () => {
                sidebar.classList.remove('active');
                overlay.classList.remove('active');
            });

            const savedName = localStorage.getItem('userName');
            if (savedName) document.getElementById('userName').innerText = savedName;
        });

        function toggleTheme() {
            document.body.classList.toggle('light-theme');
        }

        // محرك اللغة الأساسي
        let lang = 'ar';
        const d = {
            ar: { sys: "نظام الخريجين", inst: "معاهد العبور العليا", home: "الرئيسية", teams: "الفرق والطلاب", sched: "المواعيد والقاعات", stats: "الإحصائيات", out: "خروج", welcome: "إدارة الفرق", btn: "EN" },
            en: { sys: "Graduates System", inst: "Obour Institutes", home: "Home", teams: "Teams & Students", sched: "Schedules", stats: "Statistics", out: "Logout", welcome: "Teams Hub", btn: "AR" }
        };

        function toggleLang() {
            lang = lang === 'ar' ? 'en' : 'ar';
            const t = d[lang];
            document.getElementById('t-sys-name').innerText = t.sys;
            document.getElementById('t-inst').innerText = t.inst;
            document.getElementById('t-home').innerText = t.home;
            document.getElementById('t-teams').innerText = t.teams;
            document.getElementById('t-sched').innerText = t.sched;
            document.getElementById('t-stats').innerText = t.stats;
            document.getElementById('t-out').innerText = t.out;
            document.getElementById('t-welcome').innerText = t.welcome;
            document.getElementById('langBtn').innerText = t.btn;

            document.getElementById('appHtml').dir = lang === 'ar' ? 'rtl' : 'ltr';
            document.getElementById('bootstrapLink').href = lang === 'ar' ?
                "https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" :
                "https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css";
        }
    </script>
    <script src="../viewmodels/teams_viewmodel.js"></script>
</body>

</html>
