<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة الفرق والطلاب - معاهد العبور</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="../../../core/theme/variables.css">
    <link rel="stylesheet" href="../../dashboard/css/dashboard.css">
</head>
<body>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header text-center py-4">
            <h4 class="fw-bold m-0 fs-5" style="color: var(--white);">نظام الخريجين</h4>
            <small class="opacity-75 text-white">معاهد العبور العليا</small>
        </div>
        <nav class="sidebar-nav mt-3">
            <a href="../../dashboard/views/instructor_dashboard.html"><i class="fas fa-home ms-2"></i> الرئيسية</a>
            <a href="../../teams/views/teams.html" class="active"><i class="fas fa-users ms-2"></i> الفرق والطلاب</a>
            <a href="../../schedules/views/schedules.html"><i class="fas fa-calendar-alt ms-2"></i> المواعيد والقاعات</a>
            <a href="../../settings/views/settings.html"><i class="fas fa-cog ms-2"></i> الإعدادات</a>
            <a href="../../landing/views/index.html" style="color: #ffc107;"><i class="fas fa-sign-out-alt ms-2"></i> خروج</a>
        </nav>
    </aside>

    <div class="overlay" id="overlay"></div>

    <header class="main-header shadow-sm">
        <div class="d-flex align-items-center">
            <button class="btn-toggle" id="openSidebar">
                <i class="fas fa-bars"></i>
            </button>
            <h4 class="m-0 ms-3 fw-bold" style="color: var(--primary-color);">إدارة الفرق</h4>
        </div>
        <div class="user-profile fw-bold">
            <span id="userName">أ/ المعيد</span> 
            <i class="fas fa-user-circle ms-2 text-primary fs-4"></i>
        </div>
    </header>

    <main class="content-area">
        <div class="container-fluid">
            <div class="row mb-4">
                <div class="col-md-3 offset-md-9">
                    <div class="card-custom shadow-sm p-3 bg-white rounded-4 border-end border-primary border-4 text-center">
                        <small class="text-muted fw-bold">إجمالي الفرق</small>
                        <h2 class="fw-black m-0 text-primary" id="totalTeamsCount">0</h2>
                    </div>
                </div>
            </div>

            <div class="card-custom shadow-sm p-4 bg-white rounded-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h5 class="fw-bold m-0 text-dark">قائمة الطلاب والمشاريع</h5>
                    <button class="btn btn-primary rounded-pill px-4" data-bs-toggle="modal" data-bs-target="#addTeamModal" onclick="window.TeamsViewModel.prepareForAdd()">
                        <i class="fas fa-user-plus ms-1"></i> إضافة فريق
                    </button>
                </div>
                <div class="table-responsive">
                    <table class="table table-hover align-middle text-center">
                        <thead class="bg-light">
                            <tr>
                                <th>اسم الفريق</th>
                                <th>المشروع</th>
                                <th>الأعضاء</th>
                                <th>الحالة</th>
                                <th>العمليات</th>
                            </tr>
                        </thead>
                        <tbody id="teamsTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <div class="modal fade" id="addTeamModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content rounded-4 border-0 shadow">
                <div class="modal-header border-0">
                    <h5 class="modal-title fw-bold">بيانات الفريق</h5>
                    <button type="button" class="btn-close ms-0" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="addTeamForm">
                        <div class="mb-3 text-end">
                            <label class="form-label small fw-bold">اسم الفريق</label>
                            <input type="text" id="newTeamName" class="form-control rounded-3" required>
                        </div>
                        <div class="mb-3 text-end">
                            <label class="form-label small fw-bold">المشروع</label>
                            <input type="text" id="newProjectTitle" class="form-control rounded-3" required>
                        </div>
                        <div class="mb-3 text-end">
                            <label class="form-label small fw-bold">الأعضاء (فصل بـ |)</label>
                            <input type="text" id="newMembers" class="form-control rounded-3">
                        </div>
                        <button type="submit" class="btn btn-primary w-100 rounded-pill py-2">حفظ</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // سكريبت القائمة الجانبية + تحديث الاسم
        document.addEventListener('DOMContentLoaded', function() {
            const openBtn = document.getElementById('openSidebar');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');

            if(openBtn) {
                openBtn.onclick = () => { sidebar.classList.toggle('active'); overlay.classList.toggle('active'); };
            }
            if(overlay) {
                overlay.onclick = () => { sidebar.classList.remove('active'); overlay.classList.remove('active'); };
            }

            // تحديث اسم الدكتور من المخزن
            const savedName = localStorage.getItem('userName');
            const headerName = document.getElementById('userName'); 
            if (savedName && headerName) {
                headerName.innerText = savedName;
            }
        });
    </script>
    <script src="../viewmodels/teams_viewmodel.js"></script>
</body>
</html>
