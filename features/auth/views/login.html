<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - معهد العبور</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../../../core/theme/variables.css">
    <link rel="stylesheet" href="../css/auth_style.css">
</head>

<body class="auth-bg">

    <div class="container d-flex justify-content-center">
        <div class="login-card">
            <div class="alert alert-success py-2" style="font-size: 14px;">
                نظام ادارة مشاريع التخرج
            </div>

            <h2 class="logo-title">معهد العبور العالي</h2>
            <p class="text-muted mb-4" id="roleSubtitle">تسجيل دخول المعيدين

            <form action="../../dashboard/views/instructor_dashboard.html" method="GET" id="loginForm">
                <div class="mb-3 text-start">
                    <label class="form-label fw-bold">اسم المستخدم (الكود)</label>
                    <input type="text" name="user_code" class="form-control rounded-3" placeholder="أدخل الكود الخاص بك"
                        required>
                </div>

                <div class="mb-3 text-start">
                    <label class="form-label fw-bold">كلمة المرور</label>
                    <input type="password" name="password" class="form-control rounded-3" placeholder="********"
                        required>
                </div>

                <div class="d-grid mt-4">
                    <button type="submit" class="btn btn-login">دخول للنظام</button>

                    <div class="mt-3">
                        <p class="small">ليس لديك حساب؟ <a href="register.html" class="fw-bold text-decoration-none"
                                style="color: var(--primary-color);">سجل الآن</a></p>
                    </div>

                    <hr>
                    <a href="../../landing/views/index.html" class="text-muted small text-decoration-none">
                        <i class="fas fa-arrow-right ms-1"></i> العودة للرئيسية
                    </a>
                </div>
            </form>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const role = urlParams.get('role');
        const loginForm = document.getElementById('loginForm');
        const roleSubtitle = document.getElementById('roleSubtitle');

        if (role === 'student') {
            // لو طالب، بنغير الـ action يروح لداشبورد الطالب
            loginForm.action = "../../dashboard/views/student_dashboard.html";
            roleSubtitle.innerText = "تسجيل دخول الطلاب";
        } else if (role === 'instructor') {
            // لو معيد، بنغير الـ action يروح لداشبورد المعيد
            loginForm.action = "../../dashboard/views/instructor_dashboard.html";
            roleSubtitle.innerText = "تسجيل دخول أعضاء هيئة التدريس";
        }


        else if (role === 'Assistant') {
            // لو معيد، بنغير الـ action يروح لداشبورد المعيد
            loginForm.action = "../../dashboard/views/Assistant_dashboard.html";
            roleSubtitle.innerText = "تسجيل دخول المسؤولين";
        }
    </script>
    <script src="../viewmodels/login_viewmodel.js"></script>
</body>

</html>
