<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - معهد العبور</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../../core/theme/variables.css">
    <link rel="stylesheet" href="../css/auth_style.css">
</head>
<body class="auth-bg">

<div class="container d-flex justify-content-center">
    <div class="login-card">
        <div class="alert alert-success py-2" style="font-size: 14px;">
            تم إنشاء الحساب بنجاح! يمكنك الآن تسجيل الدخول.
        </div>

        <h2 class="logo-title">معهد العبور العالي</h2>
        <p class="text-muted mb-4">نظام إدارة مشاريع التخرج</p>
        
        <form action="dashboard.html" method="post" id="loginForm">
            <div class="mb-3 text-start">
                <label class="form-label fw-bold">اسم المستخدم (الكود)</label>
                <input type="text" name="user_code" class="form-control rounded-3" placeholder="أدخل الكود الخاص بك" required>
            </div>
            
            <div class="mb-3 text-start">
                <label class="form-label fw-bold">كلمة المرور</label>
                <input type="password" name="password" class="form-control rounded-3" placeholder="********" required>
            </div>
            
            <div class="d-grid mt-4">
                <button type="submit" class="btn btn-login">دخول للنظام</button>
                <p class="mt-3 small">ليس لديك حساب؟ <a href="register.html" class="text-decoration-none">سجل الآن</a></p>
                <hr>
                <a href="../../landing/views/index.html" class="text-muted small text-decoration-none">← العودة للرئيسية</a>
            </div>
        </form>
    </div>
</div>

</body>
</html>
