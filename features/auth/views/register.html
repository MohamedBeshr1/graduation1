<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب جديد - معهد العبور</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="../../../core/theme/variables.css">
    <link rel="stylesheet" href="../css/auth_style.css">
</head>
<body class="auth-bg">

<div class="container d-flex justify-content-center my-5">
    <div class="login-card register-card"> 
        <h2 class="logo-title">تسجيل طالب جديد</h2>
        <p class="text-muted mb-4">أدخل بياناتك بدقة لتتمكن من رفع مشروعك</p>
        
        <form action="login.html" method="POST">
            <div class="row">
                <div class="col-md-6 mb-3 text-start">
                    <label class="form-label fw-bold">الاسم رباعي</label>
                    <input type="text" name="full_name" class="form-control rounded-3" placeholder="أدخل اسمك كاملاً" required>
                </div>
                <div class="col-md-6 mb-3 text-start">
                    <label class="form-label fw-bold">الكود الخاص بك</label>
                    <input type="number" name="user_code" class="form-control rounded-3" placeholder="أدخل الكود الجامعي" required>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3 text-start">
                    <label class="form-label fw-bold">القسم</label>
                    <select name="department" class="form-select rounded-3" required>
                        <option selected disabled value="">اختر القسم</option>
                        <option value="systems">نظم معلومات</option>
                        <option value="engineering">هندسة</option>
                        <option value="business">إدارة أعمال</option>
                    </select>
                </div>
                <div class="col-md-6 mb-3 text-start">
                    <label class="form-label fw-bold">البريد الإلكتروني</label>
                    <input type="email" name="email" class="form-control rounded-3" placeholder="name@example.com" required>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3 text-start">
                    <label class="form-label fw-bold">كلمة المرور</label>
                    <input type="password" name="password" class="form-control rounded-3" placeholder="********" required>
                </div>
                <div class="col-md-6 mb-3 text-start">
                    <label class="form-label fw-bold">تأكيد كلمة المرور</label>
                    <input type="password" name="confirm_password" class="form-control rounded-3" placeholder="********" required>
                </div>
            </div>
            
            <div class="d-grid mt-4">
                <button type="submit" class="btn btn-login py-2">إنشاء الحساب</button>
            </div>

            <div class="mt-3 text-center">
                <p class="small text-muted">لديك حساب بالفعل؟ <a href="login.html" class="fw-bold text-decoration-none" style="color: var(--primary-color);">سجل دخول من هنا</a></p>
                <hr>
                <a href="../../landing/views/index.html" class="text-muted small text-decoration-none">← العودة للرئيسية</a>
            </div>
        </form>
    </div>
</div>

</body>
</html>
